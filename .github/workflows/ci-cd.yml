name: CI/CD Flask Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Debug step to verify files are present (optional)
      - name: Debug - List Files
        run: ls -R
      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extract metadata for tagging
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

# 5. Build Docker image
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .           # Use a dot to mean "the main folder"
          file: ./Dockerfile   # No "flask-app" prefix needed
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true

      # 6. Run tests inside container
      - name: Run tests
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} pytest

      # 7. Push image (only on main branch)
      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      # 8. Deploy (example: SSH to server)
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ steps.meta.outputs.tags }}
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d \
              --name flask-app \
              -p 80:5000 \
              ${{ steps.meta.outputs.tags }}